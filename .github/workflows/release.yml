name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Mac)
        run: |
          npm install
          brew install jq

      - name: Setup Mac Resources (FFmpeg & ExifTool)
        run: |
          mkdir -p src-tauri/resources
          # FFmpeg
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/ffmpeg-6.1.1.zip
          unzip -o ffmpeg.zip
          mv ffmpeg src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg

          # ExifTool (Gunakan file lokal dari repo "for MAC")
          echo "Using provided Mac ExifTool..."
          tar -xzf "src-tauri/resources/for MAC/Image-ExifTool-13.49.tar.gz"
          mv Image-ExifTool-13.49/exiftool src-tauri/resources/exiftool
          mv Image-ExifTool-13.49/lib src-tauri/resources/lib
          chmod +x src-tauri/resources/exiftool

      - name: Patch tauri.conf.json for Mac
        run: |
          cat src-tauri/tauri.conf.json | jq '
            .tauri.bundle.resources = ["resources/exiftool", "resources/lib", "resources/ffmpeg"] |
            .tauri.bundle.targets = ["dmg", "updater"]
          ' > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Verify resources
        run: |
          echo "=== Checking resources ==="
          ls -la src-tauri/resources/
          echo "FFmpeg size: $(wc -c < src-tauri/resources/ffmpeg)"
          echo "ExifTool size: $(wc -c < src-tauri/resources/exiftool)"

      - name: Normalize TAURI keys (Mac)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          DISABLE_UPDATER: ${{ secrets.DISABLE_UPDATER }}
        run: node scripts/restore-keys.mjs

      - name: Build App
        run: npm run tauri build

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Verify resources from repo
        run: |
          Write-Host "=== Verifying resources from repo ==="
          Get-ChildItem src-tauri/resources | Format-Table Name, Length

          # Verify FFmpeg
          $ffmpeg = Get-Item "src-tauri/resources/ffmpeg.exe"
          Write-Host "FFmpeg: $($ffmpeg.Length) bytes"
          if ($ffmpeg.Length -lt 5000000) {
            Write-Host "FFmpeg too small, downloading..."
            Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
            Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp -Force
            $f = Get-ChildItem -Path ffmpeg_temp -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
            Copy-Item $f.FullName "src-tauri/resources/ffmpeg.exe" -Force
            Remove-Item ffmpeg.zip -Force
            Remove-Item ffmpeg_temp -Recurse -Force
          }

          # Verify ExifTool
          $exiftool = Get-Item "src-tauri/resources/exiftool.exe" -ErrorAction SilentlyContinue
          $exiftoolLib = Test-Path "src-tauri/resources/exiftool_files"

          if (-not $exiftool -or $exiftool.Length -lt 10000 -or -not $exiftoolLib) {
            Write-Host "ExifTool missing or corrupted, downloading from exiftool.org..."
            Invoke-WebRequest -Uri "https://exiftool.org/exiftool-13.50.zip" -OutFile "exiftool.zip"
            Expand-Archive -Path exiftool.zip -DestinationPath "exiftool_temp" -Force

            $exe = Get-ChildItem -Path "exiftool_temp" -Filter "exiftool(-k).exe" -Recurse | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName "src-tauri/resources/exiftool.exe" -Force
            }

            $libDir = Get-ChildItem -Path "exiftool_temp" -Directory -Filter "Image-ExifTool-*" | Select-Object -First 1
            if ($libDir) {
              $libSrc = Join-Path $libDir.FullName "exiftool_files"
              if (Test-Path $libSrc) {
                if (Test-Path "src-tauri/resources/exiftool_files") {
                  Remove-Item "src-tauri/resources/exiftool_files" -Recurse -Force
                }
                Copy-Item $libSrc "src-tauri/resources/exiftool_files" -Recurse -Force
              }
            }

            Remove-Item exiftool.zip -Force
            Remove-Item "exiftool_temp" -Recurse -Force
          }

          Write-Host "`n=== Final resources ==="
          Get-ChildItem src-tauri/resources | ForEach-Object { Write-Host "$($_.Name): $($_.Length) bytes" }

      - name: Normalize TAURI keys (Windows)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          DISABLE_UPDATER: ${{ secrets.DISABLE_UPDATER }}
        run: node scripts/restore-keys.mjs

      - name: Build App
        run: npm run tauri build

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-updater-json:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate updates/version.json from Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          API="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"

          RELEASE_JSON="$(curl -sSL -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "${API}")"

          WIN_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".nsis.zip")) | .browser_download_url' | head -n 1 || true)"
          WIN_SIG_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".nsis.zip.sig")) | .browser_download_url' | head -n 1 || true)"

          MAC_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".app.tar.gz")) | .browser_download_url' | head -n 1 || true)"
          MAC_SIG_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".app.tar.gz.sig")) | .browser_download_url' | head -n 1 || true)"

          WIN_SIG=""
          if [ -n "${WIN_SIG_URL}" ] && [ "${WIN_SIG_URL}" != "null" ]; then
            WIN_SIG="$(curl -sSL "${WIN_SIG_URL}" | tr -d '\r\n')"
          fi

          MAC_SIG=""
          if [ -n "${MAC_SIG_URL}" ] && [ "${MAC_SIG_URL}" != "null" ]; then
            MAC_SIG="$(curl -sSL "${MAC_SIG_URL}" | tr -d '\r\n')"
          fi

          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p updates

          jq -n \
            --arg version "${VERSION}" \
            --arg notes "Update ${VERSION}" \
            --arg pub_date "${PUB_DATE}" \
            --arg win_url "${WIN_URL:-}" \
            --arg win_sig "${WIN_SIG:-}" \
            --arg mac_url "${MAC_URL:-}" \
            --arg mac_sig "${MAC_SIG:-}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                (if ($win_url != "" and $win_url != "null" and $win_sig != "") then
                  { "windows-x86_64": { signature: $win_sig, url: $win_url } }
                else {} end)
                +
                (if ($mac_url != "" and $mac_url != "null" and $mac_sig != "") then
                  {
                    "darwin-x86_64": { signature: $mac_sig, url: $mac_url },
                    "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
                  }
                else {} end)
              )
            }' > updates/version.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add updates/version.json
          if git diff --cached --quiet; then
            echo "No changes in updates/version.json"
            exit 0
          fi
          git commit -m "chore(updater): update version.json for ${TAG}"
          git push origin HEAD:main