name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies (Mac)
        run: |
          npm install
          brew install jq
          
      - name: Setup Mac Resources (FFmpeg & ExifTool)
        run: |
          mkdir -p src-tauri/resources
          # FFmpeg
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/ffmpeg-6.1.1.zip
          unzip -o ffmpeg.zip
          mv ffmpeg src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg
          
          # ExifTool (Gunakan file lokal dari repo "for MAC")
          echo "Using provided Mac ExifTool..."
          tar -xzf "src-tauri/resources/for MAC/Image-ExifTool-13.49.tar.gz"
          mv Image-ExifTool-13.49/exiftool src-tauri/resources/exiftool
          mv Image-ExifTool-13.49/lib src-tauri/resources/lib
          chmod +x src-tauri/resources/exiftool
          
      - name: Patch tauri.conf.json for Mac
        run: |
          # Ubah target resources agar sesuai dengan struktur Mac (binary tanpa ekstensi)
          # Hapus referensi file .exe windows dari resources array dan ganti dengan versi mac
          cat src-tauri/tauri.conf.json | jq '
            .tauri.bundle.resources = ["resources/exiftool", "resources/lib", "resources/ffmpeg"] |
            .tauri.bundle.targets = ["dmg", "updater"]
          ' > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Normalize TAURI keys (Mac)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          DISABLE_UPDATER: ${{ secrets.DISABLE_UPDATER }}
        run: node scripts/restore-keys.mjs
          
      - name: Build App
        run: npm run tauri build
        # env: TAURI_PRIVATE_KEY and TAURI_KEY_PASSWORD already in ENV from previous step
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies
        run: npm install

      - name: Setup Windows Resources (FFmpeg & ExifTool)
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources
          
          $ffmpegLocal = "src-tauri/resources/ffmpeg.exe"
          $needFfmpeg = $true
          if (Test-Path $ffmpegLocal) {
            $ffmpegInfo = Get-Item $ffmpegLocal
            if ($ffmpegInfo.Length -gt 5000000) {
              Write-Host "Using existing FFmpeg at $ffmpegLocal (Size=$($ffmpegInfo.Length))"
              $needFfmpeg = $false
            } else {
              Write-Host "Existing FFmpeg seems invalid (too small). Re-downloading. Size=$($ffmpegInfo.Length)"
            }
          }

          if ($needFfmpeg) {
            Write-Host "Downloading FFmpeg..."
            try {
              Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
              Write-Host "Extracting FFmpeg..."
              Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp -Force
              
              $ffmpeg = Get-ChildItem -Path ffmpeg_temp -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
              if ($ffmpeg) {
                Copy-Item $ffmpeg.FullName "src-tauri/resources/ffmpeg.exe" -Force
                Write-Host "FFmpeg found and copied."
              } else {
                Write-Host "Contents of ffmpeg_temp:"
                Get-ChildItem -Path ffmpeg_temp -Recurse | Select-Object FullName
                Write-Error "FFmpeg executable not found in downloaded zip"
                exit 1
              }
            } catch {
              Write-Error "Failed to download or extract FFmpeg: $_"
              exit 1
            }
          }

          Write-Host "Validating FFmpeg..."
          $ffmpegOut = & $ffmpegLocal -version 2>&1
          $ffmpegExit = $LASTEXITCODE
          $ffmpegOut | Select-Object -First 2 | ForEach-Object { Write-Host $_ }
          if ($ffmpegExit -ne 0) {
            Write-Error "FFmpeg validation failed"
            exit 1
          }
          
          $exiftoolLocal = "src-tauri/resources/exiftool.exe"
          $exiftoolLib = "src-tauri/resources/exiftool_files/lib/Image/ExifTool.pm"
          $needExifTool = $true

          if ((Test-Path $exiftoolLocal) -and (Test-Path $exiftoolLib)) {
            Write-Host "Validating ExifTool (repo resources)..."
            Push-Location "src-tauri/resources"
            try {
              $exifExit = 1
              try {
                & .\exiftool.exe -ver | Out-Host
                $exifExit = $LASTEXITCODE
              } catch {
                Write-Host ("Repo ExifTool failed to run, will fallback to Chocolatey. Error: {0}" -f $_.Exception.Message)
                $exifExit = 1
              }
              if ($exifExit -eq 0) { $needExifTool = $false }
            } finally {
              Pop-Location
            }
          } else {
            Write-Host "ExifTool repo resources not complete (missing exiftool.exe or exiftool_files). Falling back to Chocolatey."
          }

          if ($needExifTool) {
            Write-Host "Installing ExifTool via Chocolatey..."
            try {
              choco install exiftool -y --no-progress

              $toolsDir = "C:\ProgramData\chocolatey\lib\exiftool\tools"
              $exiftool = Get-ChildItem -Path $toolsDir -Filter "exiftool(-k).exe" -Recurse | Select-Object -First 1
              if (-not $exiftool) {
                Write-Host ("Contents of {0}:" -f $toolsDir)
                Get-ChildItem -Path $toolsDir -Recurse | Select-Object FullName
                throw "exiftool(-k).exe not found after Chocolatey install"
              }

              Copy-Item $exiftool.FullName "src-tauri/resources/exiftool.exe" -Force
              $exiftoolFiles = Get-ChildItem -Path $toolsDir -Directory -Filter "exiftool_files" -Recurse | Select-Object -First 1
              if ($exiftoolFiles) {
                Copy-Item $exiftoolFiles.FullName "src-tauri/resources/exiftool_files" -Recurse -Force
              }

              Write-Host "Validating ExifTool (post-install)..."
              Push-Location "src-tauri/resources"
              try {
                $exifExit = 1
                try {
                  & .\exiftool.exe -ver | Out-Host
                  $exifExit = $LASTEXITCODE
                } catch {
                  $exifExit = 1
                }
              } finally {
                Pop-Location
              }
              if ($exifExit -ne 0) { throw "ExifTool validation failed after install" }
            } catch {
              Write-Error "Failed to install/validate ExifTool: $_"
              exit 1
            }
          }

      - name: Normalize TAURI keys (Windows)
        env: 
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
          DISABLE_UPDATER: ${{ secrets.DISABLE_UPDATER }}
        run: node scripts/restore-keys.mjs

      - name: Build App
        run: npm run tauri build
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-updater-json:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate updates/version.json from Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          API="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"

          RELEASE_JSON="$(curl -sSL -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "${API}")"

          WIN_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".nsis.zip")) | .browser_download_url' | head -n 1 || true)"
          WIN_SIG_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".nsis.zip.sig")) | .browser_download_url' | head -n 1 || true)"

          MAC_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".app.tar.gz")) | .browser_download_url' | head -n 1 || true)"
          MAC_SIG_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[]? | select(.name | endswith(".app.tar.gz.sig")) | .browser_download_url' | head -n 1 || true)"

          WIN_SIG=""
          if [ -n "${WIN_SIG_URL}" ] && [ "${WIN_SIG_URL}" != "null" ]; then
            WIN_SIG="$(curl -sSL "${WIN_SIG_URL}" | tr -d '\r\n')"
          fi

          MAC_SIG=""
          if [ -n "${MAC_SIG_URL}" ] && [ "${MAC_SIG_URL}" != "null" ]; then
            MAC_SIG="$(curl -sSL "${MAC_SIG_URL}" | tr -d '\r\n')"
          fi

          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p updates

          jq -n \
            --arg version "${VERSION}" \
            --arg notes "Update ${VERSION}" \
            --arg pub_date "${PUB_DATE}" \
            --arg win_url "${WIN_URL:-}" \
            --arg win_sig "${WIN_SIG:-}" \
            --arg mac_url "${MAC_URL:-}" \
            --arg mac_sig "${MAC_SIG:-}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                (if ($win_url != "" and $win_url != "null" and $win_sig != "") then
                  { "windows-x86_64": { signature: $win_sig, url: $win_url } }
                else {} end)
                +
                (if ($mac_url != "" and $mac_url != "null" and $mac_sig != "") then
                  {
                    "darwin-x86_64": { signature: $mac_sig, url: $mac_url },
                    "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
                  }
                else {} end)
              )
            }' > updates/version.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add updates/version.json
          if git diff --cached --quiet; then
            echo "No changes in updates/version.json"
            exit 0
          fi
          git commit -m "chore(updater): update version.json for ${TAG}"
          git push origin HEAD:main
