<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metabayn Studio</title>
  </head>
  <body style="background-color: #1a1a1a; color: white; margin: 0; font-family: sans-serif;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #888;">
        <h1 style="color: white; margin-bottom: 10px;">Metabayn Studio</h1>
        <p>Loading application...</p>
        <div id="error-log" style="color: #ff5252; text-align: left; margin-top: 20px; white-space: pre-wrap; font-family: monospace; background: #000; padding: 10px; border: 1px solid #333; display: none; width: 80%; max-height: 200px; overflow: auto;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('error-log');
        if(el) {
          el.style.display = 'block';
          el.innerText += "Error: " + msg + "\nAt: " + url + ":" + line + ":" + col + "\n" + (error ? error.stack : '') + "\n\n";
        }
      };
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.getElementById('error-log');
        if(el) {
          el.style.display = 'block';
          el.innerText += "Promise Rejection: " + event.reason + "\n\n";
        }
      });

      (function () {
        function showBootError(text) {
          try {
            var el = document.getElementById('error-log');
            if (!el) return;
            el.style.display = 'block';
            el.innerText += String(text || '') + "\n\n";
          } catch {}
        }

        setTimeout(function () {
          try {
            if (window.__METABAYN_BUNDLE_LOADED__ === true) return;
            var lines = [];
            lines.push("Aplikasi berhenti di 'Loading application...' karena file JS utama tidak berhasil dimuat.");
            lines.push("");
            lines.push("Penyebab paling umum:");
            lines.push("- Build belum dibuat / belum lengkap");
            lines.push("- Folder dist/assets tidak ikut terbawa ke build installer");
            lines.push("- File assets (index-*.js / index-*.css) hilang atau path tidak cocok");
            lines.push("");
            lines.push("Solusi cepat:");
            lines.push("- Jalankan: npm run build");
            lines.push("- Lalu: npm run tauri build");
            lines.push("");
            try { lines.push("URL: " + String(window.location && window.location.href || "")); } catch {}
            showBootError(lines.join("\n"));
          } catch (e) {
            showBootError("Bootstrap check failed: " + String(e));
          }
        }, 6500);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      (async function () {
        try {
          if (location.protocol !== 'http:') return;
          await import('/src/main.tsx');
        } catch (e) {
          try {
            var el = document.getElementById('error-log');
            if (!el) return;
            el.style.display = 'block';
            var msg = '';
            try {
              msg = (e && (e.stack || e.message)) ? String(e.stack || e.message) : String(e);
            } catch {
              msg = String(e);
            }
            el.innerText += "Detail error saat import /src/main.tsx:\n" + msg + "\n\n";
          } catch {}
        }
      })();
    </script>
  </body>
  </html>
